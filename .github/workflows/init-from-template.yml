name: Init From Template
on:
  push:
    branches: [main]
jobs:
  init:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Enable write permissions
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.AGENTOS_INIT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/permissions/workflow \
            -d '{"default_workflow_permissions":"write","can_approve_pull_request_reviews":false}'

      - name: Count commits
        id: check
        run: |
          N=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits?per_page=2" \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "n=$N" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.check.outputs.n == '1'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Complete init
        if: steps.check.outputs.n == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: auto-init ${{ github.event.repository.name }}"
          git push