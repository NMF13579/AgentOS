name: Init From Template
on:
  push:
    branches: [main]
jobs:
  init:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Count commits
        id: check
        run: |
          N=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits?per_page=2" \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "n=$N" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.check.outputs.n == '1'
        with:
          token: ${{ secrets.AGENTOS_INIT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run init
        if: steps.check.outputs.n == '1'
        run: bash init-project.sh "${{ github.event.repository.name }}"

      - name: Commit
        if: steps.check.outputs.n == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto-init ${{ github.event.repository.name }}" && git push