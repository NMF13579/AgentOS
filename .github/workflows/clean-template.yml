name: Clean Template
on:
  push:
    branches: [main]
jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Clean template artifacts
        run: |
          rm -rf reports tasks tests approvals quality security stages state
          rm -f RELEASE-CHECKLIST.md CHECKLIST.md CHANGELOG.md repo-map.md ROUTES-REGISTRY.md HANDOFF.md init-project.sh
          for dir in incidents lessons memory-bank handoff; do
            if [ -d "$dir" ]; then
              find "$dir" -type f ! -name '.gitkeep' -delete
              find "$dir" -depth -mindepth 1 -type d -empty -delete
            fi
          done
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: clean template artifacts" && git push
